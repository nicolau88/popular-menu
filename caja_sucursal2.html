<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAJA | Pizzería Popular - SUC 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root { --bg-dark: #121212; --bg-panel: #1e1e1e; --primary: #FFC107; --accent: #FF3D00; --text: #ffffff; }
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Ocultar flechas del input number */
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* PANTALLA DE BLOQUEO */
        #bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
        .input-pass { padding: 15px; border-radius: 8px; border: 2px solid var(--primary); background: #222; color: white; font-size: 1.5rem; text-align: center; width: 200px; letter-spacing: 5px; }

        /* INTERFAZ DE CAJA */
        #app-caja { display: flex; width: 100%; height: 100%; }
        .panel-menu { flex: 2; display: flex; flex-direction: column; padding: 20px; background: var(--bg-dark); overflow-y: auto; border-right: 2px solid #333; }
        .header-caja { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .header-caja h1 { font-family: 'Oswald', sans-serif; color: var(--primary); margin: 0; font-size: 1.8rem; }
        
        .filtros { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .btn-filtro { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-family: 'Oswald', sans-serif; cursor: pointer; white-space: nowrap; font-size: 1rem; }
        .btn-filtro:hover, .btn-filtro.active { background: var(--primary); color: #000; }

        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 10px; }
        .btn-producto { background: var(--bg-panel); border: 1px solid #444; border-radius: 8px; padding: 15px 10px; color: white; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; align-items: center; text-align: center; min-height: 105px; transition: 0.2s; }
        .btn-producto:hover { background: #333; border-color: var(--primary); }
        .btn-producto .nombre { font-weight: bold; font-size: 0.85rem; line-height: 1.2; margin-bottom: 4px; }
        .btn-producto .desc-promo { font-size: 0.65rem; color: #aaa; margin-top: 4px; line-height: 1.1; font-style: italic; }
        .btn-producto .precio { color: var(--primary); font-family: 'Oswald', sans-serif; font-size: 1.1rem; margin-top: auto; }
        .btn-producto .variante { font-size: 0.7rem; color: #aaa; background: #333; padding: 2px 5px; border-radius: 3px; margin-bottom: 3px; }

        .panel-ticket { flex: 1; min-width: 350px; max-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; border-left: 2px solid #000; }
        .ticket-header { font-family: 'Oswald', sans-serif; font-size: 1.5rem; text-align: center; color: white; margin-bottom: 15px; border-bottom: 2px dashed #444; padding-bottom: 10px; }
        .lista-items { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        .item-cart { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .item-cart-controles { display: flex; align-items: center; gap: 8px; }
        .btn-qty { background: #444; border: none; color: white; width: 26px; height: 26px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-qty:hover { background: var(--primary); color: #000; }
        
        .seccion-cobro { border-top: 2px solid #444; padding-top: 15px; }
        .vuelto-display { display: flex; justify-content: space-between; align-items: center; background: rgba(37, 211, 102, 0.1); padding: 10px; border-radius: 6px; border: 1px solid #25D366; margin-top: 10px; }
        .input-caja { background: #121212; border: 1px solid #555; color: white; padding: 12px; border-radius: 6px; font-size: 1.1rem; text-align: right; width: 100%; box-sizing: border-box; }
        .btn-cobrar { background: #25D366; color: #000; font-family: 'Oswald', sans-serif; font-size: 1.6rem; border: none; padding: 15px; border-radius: 8px; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px; }
        .btn-pago { flex: 1; padding: 10px; background: #333; color: white; border: 1px solid #555; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem;}
        .btn-pago.active { background: #4FC3F7; color: #000; border-color: #4FC3F7; }

        /* MODALES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: #1a1a1a; width: 90%; max-width: 480px; height: 80vh; border-radius: 12px; border: 2px solid var(--primary); display: flex; flex-direction: column; }
        .modal-header { padding: 15px 20px; background: #222; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
        .modal-footer { padding: 20px; background: #222; border-top: 1px solid #333; }
        .stepper-docena { display: flex; align-items: center; background: #000; border-radius: 6px; border: 1px solid #444; height: 35px; }
        .stepper-docena button { background: none; border: none; color: var(--primary); width: 35px; height: 100%; cursor: pointer; font-size: 1.2rem; }
        .close-btn { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }

        /* IMPRESIÓN (TICKET 100% NEGRO Y GRUESO) */
        #ticket-impresion { display: none; }
        @media print {
            #app-caja, #bloqueo, .modal-overlay { display: none !important; }
            body { background: white !important; padding: 0; margin: 0; font-family: 'Courier New', monospace; }
            * { color: #000 !important; font-weight: 900 !important; text-shadow: none !important; background: transparent !important; }
            #ticket-impresion { display: block !important; width: 72mm; margin: 0 auto; font-size: 14px; line-height: 1.2; }
            .t-center { text-align: center; } 
            .t-bold { font-size: 18px; } 
            .t-line { border-top: 2px dashed black; margin: 6px 0; }
            .t-item { display: flex; justify-content: space-between; margin-bottom: 5px; align-items: flex-start; border-bottom: 2px dotted #000; padding-bottom: 4px; }
            .t-desc { font-size: 12px; margin-left: 10px; display: block; font-style: normal !important; text-transform: uppercase;}
            .t-var { margin-left:10px; font-size:12px; }
        }
    </style>
</head>
<body>

    <div id="bloqueo">
        <h1 style="font-family:'Oswald'; color:var(--primary); letter-spacing:2px;">PIZZERÍA POPULAR - SUCURSAL 2</h1>
        <input type="password" id="pass" class="input-pass" placeholder="CLAVE" autofocus onkeydown="if(event.key==='Enter') validar()">
        <button class="btn-filtro" onclick="validar()" style="padding: 15px 40px; font-size: 1.2rem;">ACCEDER AL SISTEMA</button>
    </div>

    <div id="app-caja" style="display:none;">
        <div class="panel-menu">
            <div class="header-caja">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h1>Caja - Pizzeria Popular (Sucursal 2)</h1>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <div id="loading" style="display:none;"><i class="fas fa-spinner fa-spin"></i></div>
                        <button onclick="abrirModalWA()" style="background:#25D366; color:#000; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; font-family:'Oswald'; font-weight:bold;"><i class="fab fa-whatsapp"></i> Imprimir WA</button>
                        <button onclick="abrirHistorial()" style="background:#333; color:white; border:1px solid #555; padding:8px 15px; border-radius:6px; cursor:pointer; font-family:'Oswald';"><i class="fas fa-print"></i> Últimos Tickets</button>
                    </div>
                </div>
            </div>
            
            <div class="filtros">
                <button class="btn-filtro active" id="btn-f-horneadas" onclick="filtrar('PIZZAS_HORNEADAS', 'btn-f-horneadas')">Pizzas Horneadas</button>
                <button class="btn-filtro" id="btn-f-hornear" onclick="filtrar('PIZZAS_HORNEAR', 'btn-f-hornear')">Pizzas P/Hornear</button>
                <button class="btn-filtro" id="btn-f-empanadas" onclick="filtrar('EMPANADAS', 'btn-f-empanadas')">Empanadas</button>
                <button class="btn-filtro" id="btn-f-fatays" onclick="filtrar('FATAYS', 'btn-f-fatays')">Fatays</button>
                <button class="btn-filtro" id="btn-f-promos" onclick="filtrar('PROMOS', 'btn-f-promos')">Promos</button>
                <button class="btn-filtro" id="btn-f-bebidas" onclick="filtrar('BEBIDAS', 'btn-f-bebidas')">Bebidas</button>
                <button class="btn-filtro" id="btn-f-m-horneadas" onclick="filtrar('MEDIAS_HORNEADAS', 'btn-f-m-horneadas')">1/2 Horneada</button>
                <button class="btn-filtro" id="btn-f-m-hornear" onclick="filtrar('MEDIAS_HORNEAR', 'btn-f-m-hornear')">1/2 P/Hornear</button>
                <button class="btn-filtro" id="btn-f-extras" onclick="filtrar('EXTRAS', 'btn-f-extras')" style="border: 1px solid var(--accent);">Extras</button>
            </div>
            
            <div class="grid-productos" id="grid-productos"></div>
        </div>

        <div class="panel-ticket">
            <div class="ticket-header">Venta Mostrador</div>
            <div class="lista-items" id="cart-items"></div>
            
            <div class="seccion-cobro">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">
                    <button onclick="abrirDescuento()" style="background:#333; color:white; border:1px solid #555; padding:8px 10px; border-radius:6px; cursor:pointer;"><i class="fas fa-gift" style="color:var(--accent);"></i> Descuento</button>
                    <div style="display:flex; align-items:center;">
                        <span style="font-family:'Oswald'; font-size:2rem; color:var(--primary);">$</span>
                        <input type="number" id="total-display" oninput="calcularVuelto()" style="background:transparent; border:none; border-bottom:2px dashed var(--primary); color:var(--primary); font-family:'Oswald'; font-size:2.5rem; text-align:right; width:130px; outline:none;">
                    </div>
                </div>

                <div class="opciones-pago" style="display:flex; gap:5px; margin-bottom:10px;">
                    <button class="btn-pago active" id="btn-efectivo" onclick="setMetodoPago('Efectivo')">Efectivo</button>
                    <button class="btn-pago" id="btn-transferencia" onclick="setMetodoPago('Transferencia')">Transf.</button>
                    <button class="btn-pago" id="btn-debcred" onclick="setMetodoPago('Deb/Cred')">Deb/Cred</button>
                </div>

                <div id="box-vuelto">
                    <input type="number" id="paga-con" class="input-caja" placeholder="Paga con: $" oninput="calcularVuelto()">
                    <div class="vuelto-display"><span>Vuelto:</span><strong id="display-vuelto">$0</strong></div>
                </div>

                <input type="text" id="input-cliente" class="input-caja" placeholder="Nombre del Cliente" style="margin-top:10px; text-align:left;">
                <button class="btn-cobrar" id="btn-cobrar" onclick="cobrar()" disabled>COBRAR E IMPRIMIR</button>
            </div>
        </div>
    </div>

    <!-- MODALES DOCENAS, DESCUENTOS, HISTORIAL, WA -->
    <div id="modal-docena" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 id="md-title" style="margin:0; font-family:'Oswald'; color:var(--primary);">Armar Docena</h2>
                    <div style="font-size:0.9rem; color:#aaa;">Llevás: <span id="md-count" style="color:#fff; font-weight:bold;">0</span> / 12</div>
                </div>
                <button onclick="cerrarModalDocena()" class="close-btn">&times;</button>
            </div>
            <div class="modal-body" id="md-sabores"></div>
            <div class="modal-footer">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>Precio Final:</span><strong id="md-total" style="color:var(--primary); font-size:1.5rem;">$0</strong></div>
                <button id="btn-confirmar-docena" class="btn-cobrar" onclick="confirmarDocena()" disabled>AGREGAR</button>
            </div>
        </div>
    </div>

    <div id="desc-modal" class="modal-overlay">
        <div class="modal-content" style="height:auto; max-height:300px;">
            <div class="modal-header"><h2 style="margin:0; color:var(--primary); font-family:'Oswald';">Aplicar Descuento</h2><button onclick="cerrarDescuento()" class="close-btn">&times;</button></div>
            <div class="modal-body">
                <input type="number" id="input-desc" class="input-caja" placeholder="Ingresar valor (Ej: 10 o 2000)" style="margin-bottom:15px; width:100%;">
                <div style="display:flex; gap:10px;">
                    <button class="btn-cobrar" style="background:#4FC3F7; font-size:1.2rem; margin:0;" onclick="aplicarDescuento('%')">% Porcentaje</button>
                    <button class="btn-cobrar" style="background:#25D366; font-size:1.2rem; margin:0;" onclick="aplicarDescuento('$')">$ Monto Fijo</button>
                </div>
            </div>
        </div>
    </div>

    <div id="historial-modal" class="modal-overlay">
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header">
                <h2 style="margin:0; color:var(--primary); font-family:'Oswald';">Historial SUC 2</h2>
                <div>
                    <button onclick="limpiarHistorial()" style="background:var(--accent); color:#fff; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; margin-right:15px; font-weight:bold;"><i class="fas fa-trash"></i> Limpiar</button>
                    <button onclick="cerrarHistorial()" class="close-btn">&times;</button>
                </div>
            </div>
            <div id="lista-historial" class="modal-body" style="padding:10px;"></div>
        </div>
    </div>

    <div id="wa-modal" class="modal-overlay">
        <div class="modal-content" style="max-width:500px; height:auto;">
            <div class="modal-header">
                <h2 style="margin:0; color:#25D366; font-family:'Oswald';"><i class="fab fa-whatsapp"></i> Imprimir Pedido WA</h2>
                <button onclick="cerrarModalWA()" class="close-btn">&times;</button>
            </div>
            <div class="modal-body" style="padding:20px;">
                <p style="margin-top:0; font-size:0.9rem; color:#ccc;">Pegá acá el texto que te llegó por WhatsApp:</p>
                <textarea id="wa-text" placeholder="Pegar pedido aquí (Ctrl + V)..." style="width:100%; height:250px; background:#121212; color:#fff; border:1px solid #444; border-radius:8px; padding:10px; font-family:monospace; resize:none; box-sizing:border-box; outline:none;"></textarea>
                <button class="btn-cobrar" onclick="imprimirWA()" style="background:#25D366; margin-top:15px; width:100%;">IMPRIMIR TICKET DE WHATSAPP</button>
            </div>
        </div>
    </div>

    <div id="ticket-impresion"></div>

    <script>
        const CONST_PASSWORD = "1650";
        // LA URL DE PRECIOS ES LA MISMA (EXCEL MAESTRO)
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQae4azVxGxHwSNGEcqoMUia0sNSykZxGA0koTpJ2SRcihjopNGaVAIlm2MjOhbxgmU6Y05e0ffzNVB/pub?output=csv';
        
        // EL LINK DEL NUEVO APPS SCRIPT DE LA SUCURSAL 2
        const urlRegistroVentas = 'https://script.google.com/macros/s/AKfycbxZETP1WxkmcnBdaimHc-F8CMQmLCJxeSlkNfvgbj2v4d-L5sPfptHA1B8fXLcfTty_/exec';

        let catalogo = [], carrito = [], subtotalReal = 0, metodoPago = 'Efectivo';
        let dbClasicas = [], dbPremium = [], precioBaseClasica = 0, promoDocenaItem = null;
        let docenaActual = null, docenaSeleccion = {}, docenaCantTotal = 0, docenaPrecioExtra = 0;

        function validar() {
            if (document.getElementById('pass').value === CONST_PASSWORD) {
                document.getElementById('bloqueo').style.display = 'none';
                document.getElementById('app-caja').style.display = 'flex';
                cargarMenu();
            } else { alert("Clave Incorrecta"); document.getElementById('pass').value = ''; }
        }

        function cargarMenu() {
            fetch(csvUrl).then(r => r.text()).then(csvText => {
                document.getElementById('loading').style.display = 'none';
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: function(r) { procesar(r.data); }
                });
            });
        }

        function formatPrice(n) { return n.toLocaleString('es-AR'); }
        function cleanPrice(s) { return parseInt(s.toString().replace(/[^0-9]/g, '')) || 0; }
        function normalize(s) { return s ? s.trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ') : ''; }
        function cleanEmojis(str) { return str.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F600}-\u{1F64F}\u{1F680}-\u{1F6FF}⭐❄️🔥🌓]/gu, '').trim(); }

        function procesar(data) {
            data.forEach(item => {
                if (!item.SECCION || !item.NOMBRE || normalize(item.SECCION) === 'CONFIGURACION') return;
                
                // --- FILTRO MAGICO DESDE EL EXCEL ---
                // Busca la columna "SUCURSAL 2". Si dice "NO", saltea el producto y lo oculta en la caja.
                let disponibleSuc2 = item['SUCURSAL 2'] || item['Sucursal 2'] || item['sucursal 2'] || item.SUCURSAL_2;
                if (disponibleSuc2 && disponibleSuc2.toString().trim().toUpperCase() === 'NO') return;

                // Ocultar Docena Especial del menu empanadas
                if (item.NOMBRE.toUpperCase().includes('DOCENA') && item.NOMBRE.toUpperCase().includes('ESPECIAL')) return;
                
                let p1 = cleanPrice(item.PRECIO_1), p2 = cleanPrice(item.PRECIO_2), seccion = normalize(item.SECCION);
                let isDocena = item.NOMBRE.toUpperCase().includes('DOCENA') && !item.NOMBRE.toUpperCase().includes('ESPECIAL');
                let isFatay = item.NOMBRE.toUpperCase().includes('FATAY') || seccion.includes('FATAY');

                if (isDocena && !isFatay && !promoDocenaItem) promoDocenaItem = { nombre: item.NOMBRE, precio: p1 };
                if (seccion.includes('CLASICAS') && !isDocena) { dbClasicas.push(item); if (precioBaseClasica === 0) precioBaseClasica = p1; }
                if (seccion.includes('PREMIUM') && !isDocena) dbPremium.push(item);

                let prodObj = { nombre: item.NOMBRE, descripcion: item.DESCRIPCION || "", variante: "", precio: p1, categoria: "", isDocena: isDocena };

                if (seccion.includes('MEDIA')) {
                    if(p2 > 0) catalogo.push({ ...prodObj, variante: 'Horneada', precio: p2, categoria: 'MEDIAS_HORNEADAS', isDocena: false });
                    if(p1 > 0) catalogo.push({ ...prodObj, variante: 'Para Hornear', precio: p1, categoria: 'MEDIAS_HORNEAR', isDocena: false });
                } else if(seccion.includes('PIZZA')) {
                    if(p2 > 0) catalogo.push({ ...prodObj, variante: 'Horneada', precio: p2, categoria: 'PIZZAS_HORNEADAS', isDocena: false });
                    if(p1 > 0) catalogo.push({ ...prodObj, variante: 'Para Hornear', precio: p1, categoria: 'PIZZAS_HORNEAR', isDocena: false });
                } else if(isFatay) { catalogo.push({ ...prodObj, categoria: 'FATAYS' });
                } else if(seccion.includes('EMPANADA')) { catalogo.push({ ...prodObj, categoria: 'EMPANADAS' });
                } else if(seccion.includes('PROMO')) { catalogo.push({ ...prodObj, categoria: 'PROMOS' });
                } else if(seccion.includes('BEBIDA') || seccion.includes('CERVEZA')) { catalogo.push({ ...prodObj, categoria: 'BEBIDAS' });
                } else if(seccion.includes('EXTRA')) { catalogo.push({ ...prodObj, categoria: 'EXTRAS' }); }
            });
            catalogo.sort((a, b) => (a.isDocena && !b.isDocena) ? 1 : (!a.isDocena && b.isDocena) ? -1 : 0);
            filtrar('PIZZAS_HORNEADAS', 'btn-f-horneadas');
        }

        function filtrar(cat, id) {
            document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const grid = document.getElementById('grid-productos'); grid.innerHTML = '';
            
            catalogo.filter(i => i.categoria === cat).forEach(item => {
                let btn = document.createElement('button'); btn.className = 'btn-producto';
                btn.onclick = () => { if (item.isDocena && item.categoria !== 'FATAYS') abrirModalDocena(item); else add(item.nombre, item.variante, item.precio, item.isDocena, item.categoria, item.descripcion); };
                let descHtml = (cat === 'PROMOS' && item.descripcion) ? `<div class="desc-promo">${item.descripcion}</div>` : "";
                btn.innerHTML = `<div class="nombre">${item.nombre}</div>${item.variante ? `<div class="variante">${item.variante}</div>` : ''}${descHtml}<div class="precio">$${formatPrice(item.precio)}</div>`;
                grid.appendChild(btn);
            });
        }

        function add(n, v, p, d, c, desc = "") {
            let ex = carrito.find(i => i.nombre === n && i.variante === v);
            if (ex && !d) ex.cantidad++; else carrito.push({ nombre: n, variante: v, precio: p, cantidad: 1, isDocena: d, categoria: c, descripcion: desc });
            autoEmp(); update();
        }

        function autoEmp() {
            if (!promoDocenaItem) return;
            let sueltas = carrito.filter(i => i.categoria === 'EMPANADAS' && !i.isDocena);
            let totalSueltas = sueltas.reduce((s, i) => s + i.cantidad, 0);
            while (totalSueltas >= 12) {
                let sab = {}, rec = 0, extra = 0;
                for (let i = 0; i < carrito.length; i++) {
                    let it = carrito[i];
                    if (it.categoria === 'EMPANADAS' && !it.isDocena) {
                        while (it.cantidad > 0 && rec < 12) {
                            it.cantidad--; rec++; sab[it.nombre] = (sab[it.nombre] || 0) + 1;
                            if (dbPremium.some(p => p.NOMBRE === it.nombre)) extra += (it.precio - precioBaseClasica);
                        }
                    }
                    if (rec === 12) break;
                }
                carrito = carrito.filter(i => i.cantidad > 0);
                let v = Object.entries(sab).map(([n, c]) => `${c}x ${n}`).join(' | ');
                add(promoDocenaItem.nombre, v, promoDocenaItem.precio + extra, true, 'PROMOS', "");
                totalSueltas -= 12;
            }
        }

        function update() {
            const container = document.getElementById('cart-items'); container.innerHTML = ''; subtotalReal = 0;
            if (carrito.length === 0) { container.innerHTML = '<p style="text-align:center; color:#666; margin-top:40px;">No hay productos</p>'; document.getElementById('btn-cobrar').disabled = true; }
            else {
                document.getElementById('btn-cobrar').disabled = false;
                carrito.forEach((item, i) => {
                    let total = item.precio * item.cantidad; subtotalReal += total;
                    container.innerHTML += `<div class="item-cart"><div><b>${item.nombre}</b><br><small style="color:#aaa;">${item.variante}</small></div><div class="item-cart-controles"><button class="btn-qty" onclick="cant(${i},-1)">-</button><b>${item.cantidad}</b><button class="btn-qty" onclick="cant(${i},1)">+</button></div><div>$${formatPrice(total)}</div></div>`;
                });
            }
            document.getElementById('total-display').value = subtotalReal; 
            calcularVuelto();
        }

        function cant(i, d) { carrito[i].cantidad += d; if (carrito[i].cantidad <= 0) carrito.splice(i, 1); autoEmp(); update(); }
        
        function setMetodoPago(m) { 
            metodoPago = m; 
            document.getElementById('btn-efectivo').classList.toggle('active', m === 'Efectivo'); 
            document.getElementById('btn-transferencia').classList.toggle('active', m === 'Transferencia'); 
            document.getElementById('btn-debcred').classList.toggle('active', m === 'Deb/Cred'); 
            document.getElementById('box-vuelto').style.opacity = m === 'Efectivo' ? '1' : '0.2'; 
            document.getElementById('paga-con').disabled = m !== 'Efectivo';
        }
        
        function calcularVuelto() { 
            let paga = parseFloat(document.getElementById('paga-con').value) || 0; 
            let t = parseFloat(document.getElementById('total-display').value) || 0;
            let v = paga - t; 
            document.getElementById('display-vuelto').innerText = (paga > 0 && v >= 0) ? "$"+formatPrice(v) : "$0"; 
        }

        // --- DESCUENTOS ---
        function abrirDescuento() { document.getElementById('desc-modal').style.display = 'flex'; document.getElementById('input-desc').value = ''; }
        function cerrarDescuento() { document.getElementById('desc-modal').style.display = 'none'; }
        function aplicarDescuento(tipo) {
            let val = parseFloat(document.getElementById('input-desc').value);
            if(!val) return;
            let nuevoTotal = subtotalReal;
            if(tipo === '%') nuevoTotal = subtotalReal - (subtotalReal * val / 100);
            else nuevoTotal = subtotalReal - val;
            document.getElementById('total-display').value = Math.max(0, nuevoTotal);
            cerrarDescuento(); calcularVuelto();
        }

        // --- DOCENAS ---
        function abrirModalDocena(item) {
            docenaActual = item; docenaSeleccion = {}; docenaCantTotal = 0; docenaPrecioExtra = 0;
            document.getElementById('md-title').innerText = item.nombre;
            let h = '<h4 style="border-bottom:1px solid #333; padding-bottom:5px;">Clásicas</h4>';
            dbClasicas.forEach(e => {
                let n = e.NOMBRE.replace(/'/g, "\\'");
                h += `<div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span>${e.NOMBRE}</span><div class="stepper-docena"><button onclick="gusto('${n}',-1,false,0)">-</button><span id="md-qty-${n.replace(/\s+/g,'')}" style="width:30px; text-align:center;">0</span><button onclick="gusto('${n}',1,false,0)">+</button></div></div>`;
            });
            h += '<h4 style="border-bottom:1px solid #333; padding-bottom:5px; color:var(--accent);">Premium</h4>';
            dbPremium.forEach(e => {
                let n = e.NOMBRE.replace(/'/g, "\\'"), ex = cleanPrice(e.PRECIO_1) - precioBaseClasica;
                h += `<div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span>${e.NOMBRE} (+${ex})</span><div class="stepper-docena"><button onclick="gusto('${n}',-1,true,${ex})">-</button><span id="md-qty-${n.replace(/\s+/g,'')}" style="width:30px; text-align:center;">0</span><button onclick="gusto('${n}',1,true,${ex})">+</button></div></div>`;
            });
            document.getElementById('md-sabores').innerHTML = h; document.getElementById('modal-docena').style.display = 'flex'; uiDocena();
        }

        function gusto(n, d, p, e) {
            let a = docenaSeleccion[n] || 0; if ((d > 0 && docenaCantTotal >= 12) || (d < 0 && a <= 0)) return;
            docenaSeleccion[n] = a + d; docenaCantTotal += d; if (p) docenaPrecioExtra += (d * e);
            document.getElementById(`md-qty-${n.replace(/\s+/g,'')}`).innerText = docenaSeleccion[n]; uiDocena();
        }

        function uiDocena() {
            document.getElementById('md-count').innerText = docenaCantTotal;
            document.getElementById('md-total').innerText = "$"+formatPrice(docenaActual.precio + docenaPrecioExtra);
            document.getElementById('btn-confirmar-docena').disabled = docenaCantTotal !== 12;
        }

        function cerrarModalDocena() { document.getElementById('modal-docena').style.display = 'none'; }
        function confirmarDocena() {
            let s = Object.entries(docenaSeleccion).filter(([n, c]) => c > 0).map(([n, c]) => `${c}x ${n}`).join(' | ');
            add(docenaActual.nombre, s, docenaActual.precio + docenaPrecioExtra, true, 'PROMOS', ""); cerrarModalDocena();
        }

        // --- HISTORIAL / REIMPRESIÓN / WA ---
        function abrirHistorial() {
            let hist = []; try { hist = JSON.parse(localStorage.getItem('ticketsPizzeria_S2')) || []; } catch(e) {}
            let cont = document.getElementById('lista-historial'); cont.innerHTML = '';
            if(hist.length === 0) { cont.innerHTML = '<p style="text-align:center; color:#aaa; margin-top:20px;">No hay tickets guardados</p>'; } 
            else {
                let fechaHoy = new Date().toLocaleDateString('es-AR');
                hist.forEach((t, i) => {
                    let displayFecha = (t.fecha === fechaHoy) ? '<span style="color:#25D366; font-weight:bold;">HOY</span>' : `<span style="color:#FF3D00; font-weight:bold;">${t.fecha || 'Anterior'}</span>`;
                    cont.innerHTML += `<div style="background:#222; padding:15px; margin-bottom:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;"><div><b style="color:var(--primary); font-size:1.1rem;">Turno #${t.id}</b> - ${displayFecha} ${t.time}<br><span style="color:#ddd;">Cliente: ${t.cliente}</span><br><b>$${formatPrice(t.total)}</b></div><button onclick="reimprimir(${i})" style="background:var(--primary); color:#000; border:none; padding:12px 20px; border-radius:6px; font-weight:bold; cursor:pointer; font-size:1.2rem;"><i class="fas fa-print"></i></button></div>`;
                });
            }
            document.getElementById('historial-modal').style.display = 'flex';
        }
        function cerrarHistorial() { document.getElementById('historial-modal').style.display = 'none'; }
        function limpiarHistorial() { if(confirm("¿Borrar historial de esta PC?")) { localStorage.removeItem('ticketsPizzeria_S2'); abrirHistorial(); } }
        function reimprimir(i) { let hist = JSON.parse(localStorage.getItem('ticketsPizzeria_S2')) || []; if(hist[i]) { document.getElementById('ticket-impresion').innerHTML = hist[i].html; window.print(); } }
        
        function abrirModalWA() { document.getElementById('wa-modal').style.display = 'flex'; document.getElementById('wa-text').value = ''; document.getElementById('wa-text').focus(); }
        function cerrarModalWA() { document.getElementById('wa-modal').style.display = 'none'; }
        function imprimirWA() {
            let texto = document.getElementById('wa-text').value.trim(); if (!texto) { alert("Tenés que pegar el texto del pedido primero."); return; }
            
            // Transformar asteriscos de WhatsApp en texto Negrita grande
            let htmlTexto = texto.replace(/\*(.*?)\*/g, '<b style="font-size:15px; text-transform:uppercase;">$1</b>');
            
            // Reemplazar líneas de guiones por cortes de ticket reales
            htmlTexto = htmlTexto.replace(/-{4,}/g, '</div><div class="t-line"></div><div style="font-size:14px; line-height:1.4; padding: 5px 0;">');
            
            // Hacer un separador gigante donde empiece la sección de "PEDIDO" para la cocina
            htmlTexto = htmlTexto.replace(/(<b>.*?PEDIDO.*?<\/b>)/i, '<div class="t-line" style="margin-top:15px; border-top: 3px dashed black;"></div><div class="t-center" style="font-size:20px; font-weight:900; margin:10px 0;">--- COCINA ---</div><div class="t-line" style="margin-bottom:10px; border-top: 3px dashed black;"></div>');
            
            // Convertir saltos de línea normales
            htmlTexto = htmlTexto.replace(/\n/g, '<br>');

            document.getElementById('ticket-impresion').innerHTML = `<div class="t-center t-bold">PIZZERIA POPULAR - SUC 2</div><div class="t-center" style="margin-bottom: 10px;">PEDIDO APP / WA</div><div class="t-line"></div><div style="font-size:14px; line-height:1.4; padding: 5px 0;">${htmlTexto}</div><div class="t-line"></div><div class="t-center" style="margin-top:10px; font-weight:900; font-size:16px;">FIN DEL TICKET</div>`;
            window.print(); cerrarModalWA();
        }

        // --- COBRAR ---
        function cobrar() {
            let cli = document.getElementById('input-cliente').value || "Mostrador";
            let fec = new Date().toLocaleDateString('es-AR');
            let hor = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
            let numTurno = Math.floor(100+Math.random()*900);
            let totalCargar = parseFloat(document.getElementById('total-display').value) || 0;

            let t = `<div class="t-center t-bold">PIZZERIA POPULAR - SUC 2</div><div class="t-center">Turno: #${numTurno}</div><div class="t-line"></div><div>Fecha: ${fec} ${hor}</div><div>Cliente: ${cli}</div><div class="t-line"></div>`;
            let detExcel = [], scriptCart = [];
            
            carrito.forEach(it => {
                let cleanName = cleanEmojis(it.nombre);
                let cleanVar = cleanEmojis(it.variante);
                
                let vTicket = '';
                if (it.isDocena && it.variante) { vTicket = cleanVar.split('|').map(s => `<div class="t-var">- ${s.trim()}</div>`).join(''); } 
                else if (it.variante) { vTicket = `<div class="t-var">- ${cleanVar}</div>`; }
                let descHtml = (it.categoria === 'PROMOS' && it.descripcion) ? `<div class="t-desc">Inc: ${cleanEmojis(it.descripcion)}</div>` : "";
                
                t += `<div class="t-item"><div><b>${it.cantidad}x ${cleanName}</b>${vTicket}${descHtml}</div><div>$${formatPrice(it.precio*it.cantidad)}</div></div>`;
                
                // Detalle limpio para el Excel
                let detString = `${it.cantidad}x ${cleanName}`;
                if (cleanVar) detString += ` [${cleanVar}]`;
                detExcel.push(detString);

                // Mandamos la info pura, sin desglosar docenas ni inventar prefijos
                scriptCart.push({ name: cleanName, variant: cleanVar, quantity: it.cantidad, price: it.precio, isDocena: it.isDocena });
            });
            
            t += `<div class="t-line"></div><div class="t-total" style="font-size:18px; font-weight:900; text-align:right;">TOTAL: $${formatPrice(totalCargar)}</div><div>Pago: ${metodoPago}</div><div class="t-line"></div><div class="t-center" style="margin-top:10px; font-weight:900; font-size:16px;">PARA COCINA - #${numTurno}</div>`;
            document.getElementById('ticket-impresion').innerHTML = t;
            
            try { let hist = JSON.parse(localStorage.getItem('ticketsPizzeria_S2')) || []; hist.unshift({ id: numTurno, cliente: cli, total: totalCargar, fecha: fec, time: hor, html: t }); if(hist.length > 50) hist.pop(); localStorage.setItem('ticketsPizzeria_S2', JSON.stringify(hist)); } catch(e) {}
            window.print();

            fetch(urlRegistroVentas, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ fecha: fec, hora: hor, cliente: cli, telefono: "-", tipoEntrega: "Mostrador", direccion: "Local", pago: metodoPago, total: totalCargar, envio: 0, detalleResumen: detExcel.join(' + '), carrito: scriptCart }) });
            carrito = []; document.getElementById('paga-con').value = ''; document.getElementById('input-cliente').value = ''; update();
        }
    </script>
</body>
</html>
