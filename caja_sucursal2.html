<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAJA | Pizzería Popular (Sucursal 2)</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="caja_styles_suc2.css?v=2">
</head>
<body>

    <div id="bloqueo">
        <h1 style="font-family:'Oswald'; color:var(--primary); letter-spacing:2px;">PIZZERÍA POPULAR</h1>
        <input type="password" id="pass" class="input-pass" placeholder="CLAVE" autofocus>
        <button id="btn-login" class="btn-filtro" style="padding: 15px 40px; font-size: 1.2rem;">ACCEDER AL SISTEMA</button>
    </div>

    <div id="app-caja" style="display:none;">
        <div class="panel-menu">
            <div class="header-caja">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h1>Caja - Pizzeria Popular (Sucursal 2)</h1>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <div id="sync-status-indicator" class="sync-status" title="Sincronización de ventas con la nube." style="display: none;">
                            <i class="fas fa-satellite-dish"></i> <span id="sync-text">Online</span>
                        </div>
                        <div id="loading" style="display:none;"><i class="fas fa-spinner fa-spin"></i></div>
                        <button id="btn-modal-wa" style="background:#25D366; color:#000; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; font-family:'Oswald'; font-weight:bold;"><i class="fab fa-whatsapp"></i> Imprimir WA</button>
                        <button id="btn-historial" style="background:#333; color:white; border:1px solid #555; padding:8px 15px; border-radius:6px; cursor:pointer; font-family:'Oswald';"><i class="fas fa-print"></i> Últimos Tickets</button>
                    </div>
                </div>
            </div>
            
            <div class="filtros" id="contenedor-filtros">
                <button class="btn-filtro active" data-categoria="PIZZAS_HORNEADAS">Pizzas Horneadas</button>
                <button class="btn-filtro" data-categoria="PIZZAS_HORNEAR">Pizzas P/Hornear</button>
                <button class="btn-filtro" data-categoria="EMPANADAS">Empanadas</button>
                <button class="btn-filtro" data-categoria="FATAYS">Fatays</button>
                <button class="btn-filtro" data-categoria="PROMOS">Promos</button>
                <button class="btn-filtro" data-categoria="BEBIDAS">Bebidas</button>
                <button class="btn-filtro" data-categoria="MEDIAS_HORNEADAS">1/2 Horneada</button>
                <button class="btn-filtro" data-categoria="MEDIAS_HORNEAR">1/2 P/Hornear</button>
                <button class="btn-filtro" data-categoria="EXTRAS" style="border: 1px solid var(--accent);">Extras</button>
            </div>
            
            <div class="grid-productos" id="grid-productos"></div>
        </div>

        <div class="panel-ticket">
            <div class="ticket-header">
                <span>Venta Mostrador</span>
                <div style="font-size: 0.85rem; display:flex; align-items:center; gap:5px; font-family:'Roboto', sans-serif; text-transform:none; letter-spacing:normal;">
                    <label for="toggle-autodocena" style="color:#aaa; cursor:pointer;">Auto-Docena</label>
                    <input type="checkbox" id="toggle-autodocena" checked style="cursor:pointer; width:16px; height:16px;">
                </div>
            </div>
            <div class="lista-items" id="cart-items"></div>
            
            <div class="seccion-cobro">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">
                    <button id="btn-abrir-descuento" style="background:#333; color:white; border:1px solid #555; padding:8px 10px; border-radius:6px; cursor:pointer;"><i class="fas fa-gift" style="color:var(--accent);"></i> Descuento</button>
                    <div style="display:flex; align-items:center;">
                        <span style="font-family:'Oswald'; font-size:2rem; color:var(--primary);">$</span>
                        <input type="number" id="total-display" style="background:transparent; border:none; border-bottom:2px dashed var(--primary); color:var(--primary); font-family:'Oswald'; font-size:2.5rem; text-align:right; width:130px; outline:none;">
                    </div>
                </div>

                <div class="opciones-pago" style="display:flex; gap:5px; margin-bottom:10px;" id="contenedor-pagos">
                    <button class="btn-pago active" data-metodo="Efectivo">Efectivo</button>
                    <button class="btn-pago" data-metodo="Transferencia">Transf.</button>
                    <button class="btn-pago" data-metodo="Deb/Cred">Deb/Cred</button>
                </div>

                <div id="box-vuelto">
                    <input type="number" id="paga-con" class="input-caja" placeholder="Paga con: $">
                    <div class="vuelto-display"><span>Vuelto:</span><strong id="display-vuelto">$0</strong></div>
                </div>

                <input type="text" id="input-cliente" class="input-caja" placeholder="Nombre del Cliente" style="margin-top:10px; text-align:left;">
                <button class="btn-cobrar" id="btn-cobrar" disabled>COBRAR E IMPRIMIR</button>
            </div>
        </div>
    </div>

    <!-- MODALES -->
    <div id="modal-docena" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 id="md-title" style="margin:0; font-family:'Oswald'; color:var(--primary);">Armar Docena</h2>
                    <div style="font-size:0.9rem; color:#aaa;">Llevás: <span id="md-count" style="color:#fff; font-weight:bold;">0</span> / 12</div>
                </div>
                <button id="btn-cerrar-md-docena" class="close-btn" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-body" id="md-sabores"></div>
            <div class="modal-footer">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>Precio Final:</span><strong id="md-total" style="color:var(--primary); font-size:1.5rem;">$0</strong></div>
                <button id="btn-confirmar-docena" class="btn-cobrar" disabled>AGREGAR</button>
            </div>
        </div>
    </div>

    <div id="desc-modal" class="modal-overlay">
        <div class="modal-content" style="height:auto; max-height:300px;">
            <div class="modal-header"><h2 style="margin:0; color:var(--primary); font-family:'Oswald';">Aplicar Descuento</h2><button id="btn-cerrar-desc" class="close-btn" aria-label="Cerrar">&times;</button></div>
            <div class="modal-body">
                <input type="number" id="input-desc" class="input-caja" placeholder="Ingresar valor (Ej: 10 o 2000)" style="margin-bottom:15px; width:100%;">
                <div style="display:flex; gap:10px;">
                    <button id="btn-desc-porcentaje" class="btn-cobrar" style="background:#4FC3F7; font-size:1.2rem; margin:0;" >% Porcentaje</button>
                    <button id="btn-desc-monto" class="btn-cobrar" style="background:#25D366; font-size:1.2rem; margin:0;" >$ Monto Fijo</button>
                </div>
            </div>
        </div>
    </div>

    <div id="historial-modal" class="modal-overlay">
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header">
                <h2 style="margin:0; color:var(--primary); font-family:'Oswald';">Historial</h2>
                <div>
                    <button id="btn-limpiar-historial" style="background:var(--accent); color:#fff; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; margin-right:15px; font-weight:bold;"><i class="fas fa-trash"></i> Limpiar</button>
                    <button id="btn-cerrar-historial" class="close-btn" aria-label="Cerrar">&times;</button>
                </div>
            </div>
            <div id="lista-historial" class="modal-body" style="padding:10px;"></div>
        </div>
    </div>

    <div id="wa-modal" class="modal-overlay">
        <div class="modal-content" style="max-width:500px; height:auto;">
            <div class="modal-header">
                <h2 style="margin:0; color:#25D366; font-family:'Oswald';"><i class="fab fa-whatsapp"></i> Imprimir Pedido WA</h2>
                <button id="btn-cerrar-wa" class="close-btn" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-body" style="padding:20px;">
                <p style="margin-top:0; font-size:0.9rem; color:#ccc;">Pegá acá el texto que te llegó por WhatsApp:</p>
                <textarea id="wa-text" placeholder="Pegar pedido aquí (Ctrl + V)..." style="width:100%; height:250px; background:#121212; color:#fff; border:1px solid #444; border-radius:8px; padding:10px; font-family:monospace; resize:none; box-sizing:border-box; outline:none;"></textarea>
                <button id="btn-imprimir-wa" class="btn-cobrar" style="background:#25D366; margin-top:15px; width:100%;">IMPRIMIR TICKET DE WHATSAPP</button>
            </div>
        </div>
    </div>

    <div id="ticket-impresion"></div>
    
    <!-- TOAST -->
    <div id="toast"></div>

    <script src="caja_app_suc2.js?v=2"></script>
</body>
</html>
