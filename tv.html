<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera Digital - Pizzería Popular</title>
    <link rel="stylesheet" href="tv_styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <div id="loading" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#111; color:#fff; display:flex; justify-content:center; align-items:center; z-index:9999; font-size:2rem; font-family:'Oswald', sans-serif;">
        Cargando Precios...
    </div>

    <div class="tv-container">
        <!-- DECORACIONES DE FONDO -->
        <div class="bg-deco deco-topLeft">🍕</div>
        <div class="bg-deco deco-bottomRight">🍅</div>
        <div class="bg-deco deco-bottomLeft">🍄</div>

        <!-- HEADER -->
        <header class="tv-header">
            <div class="header-empty"></div>
            <div class="logo-area">
                <img src="logo_nuevo.png" alt="Pizzeria Popular" class="logo">
            </div>
            <div class="col-headers">
                <div class="col-title">P/Hornear</div>
                <div class="col-divider">-</div>
                <div class="col-title">Horneadas</div>
            </div>
        </header>

        <!-- BODY / LISTA DE PRODUCTOS -->
        <main class="tv-lista" id="pizza-list">
            <!-- Se inyectarán desde tv_app.js -->
        </main>

        <!-- FOOTER / LEYENDA -->
        <footer class="tv-footer">
            <div class="footer-badge">
                <span class="icon-pizza">🍕</span>
                <span class="text-horneadas">HORNEADAS +</span><span class="text-precio" id="extra-precio">$0</span>
            </div>
        </footer>
    </div>

    <script src="tv_app.js"></script>
</body>
</html>
